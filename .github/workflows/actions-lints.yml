name: actions-lints

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
  workflow_call:

permissions: {}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    name: actionlint
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  ghalint:
    runs-on: ubuntu-latest
    name: ghalint
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install ghalint
        env:
          # renovate: datasource=github-releases packageName=suzuki-shunsuke/ghalint
          GHALINT_VERSION: v1.5.6
        run: |
          curl -fsSL "https://github.com/suzuki-shunsuke/ghalint/releases/download/${GHALINT_VERSION}/ghalint_${GHALINT_VERSION#v}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin ghalint
      - name: Run ghalint
        run: ghalint run

  zizmor:
    runs-on: ubuntu-latest
    name: zizmor
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
